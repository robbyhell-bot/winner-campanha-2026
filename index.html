<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 Sistema de Pontuação</title>

<style>
body{font-family:Arial,sans-serif;background:#1e1e2f;color:#f0f0f0;margin:0}
.topbar{position:fixed;top:0;left:0;right:0;height:70px;background:rgba(20,20,40,.85);display:flex;align-items:center;padding:0 20px;z-index:1000}
.logo-area{display:flex;align-items:center;gap:12px}
.logo-area img{height:48px}
.logo-text{font-size:20px;font-weight:bold}
.logo-sub{font-size:12px;color:#aaa}
.container{max-width:1100px;margin:auto;padding:90px 10px 20px}
.card{background:#2a2a3f;padding:15px;margin:15px 0;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,.5)}
input,select,button{padding:10px;margin:6px 0;border-radius:6px;border:none;font-size:1em}
input,select{background:#3a3a50;color:#fff;width:48%}
button{cursor:pointer;background:linear-gradient(135deg,#4e5bf2,#6b76ff);color:#fff;font-weight:bold}
button:hover{filter:brightness(1.1)}
.remover-btn{background:linear-gradient(135deg,#f25c5c,#ff7b7b)}
.ranking-item,.campanha-item,.colaborador-item{padding:10px;border-bottom:1px solid #444;border-left:6px solid transparent;display:flex;justify-content:space-between;align-items:center}
.verde{background:#2d4d2d;border-left-color:#00ff00}
.amarelo{background:#4f4a2d;border-left-color:#ffcc00}
.vermelho{background:#4d2d2d;border-left-color:#ff4444}
.hist-item{font-size:14px;border-bottom:1px dashed #555;padding:6px 0;white-space:pre-line}
canvas{width:100%!important}
@media(max-width:600px){input,select,button{width:100%}}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo-area">
    <img src="./logo.jpg.jpg">
    <div>
      <div class="logo-text">Winner Promotoria e Vendas</div>
      <div class="logo-sub">A gente sabe o que faz</div>
    </div>
  </div>

  <!-- BOTÃO SALVAR -->
  <button id="btnSalvar" style="margin-left:auto;">💾 Salvar</button>
</div>

<div class="container">
<h1>🎯 Sistema de Pontuação</h1>

<div class="card">
<h3>👥 Colaboradores</h3>
<input id="nomeColaborador" placeholder="Nome">
<button onclick="adicionarColaborador()">➕ Adicionar</button>
<div id="listaColaboradores"></div>
</div>

<div class="card">
<h3>🏷️ Campanhas</h3>
<input id="nomeCampanha" placeholder="Nome da campanha">
<input id="valorCampanha" type="number" placeholder="Pontos">
<button onclick="criarCampanha()">➕ Criar</button>
<div id="listaCampanhas"></div>
</div>

<div class="card">
<h3>💰 Pontuação</h3>
<select id="selectColaborador"></select>
<select id="selectCampanha"></select><br>
<button onclick="aplicarCampanha()">➕ Pontos</button>
<button onclick="removerPontos()">➖ Remover</button>
</div>

<div class="card">
<h3>🚫 Infrações</h3>
<select id="selectInfracaoColaborador"></select>
<input id="pontosInfracao" type="number" placeholder="Pontos a remover">
<select id="motivoInfracao">
  <option value="">Motivo</option>
  <option value="❌ Falta">❌ Falta</option>
  <option value="🏥 Atestado">🏥 Atestado</option>
  <option value="⏰ Vencimento">⏰ Vencimento</option>
</select><br>
<button onclick="aplicarInfracao()">🚫 Aplicar Infração</button>
</div>

<div class="card"><h3>🏆 Ranking</h3><div id="ranking"></div></div>
<div class="card"><h3>📊 Dashboard Colaboradores</h3><canvas id="chartColaboradores"></canvas></div>
<div class="card"><h3>📊 Dashboard Campanhas</h3><canvas id="chartCampanhas"></canvas></div>
<div class="card"><h3>📜 Histórico</h3><div id="historico"></div></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
let colaboradores=[], campanhas=[], historico=[], pontosPorCampanha=[];
let chartColaboradores=null, chartCampanhas=null;
let lastCol=null, lastCamp=null;

function getDataHora(){
 const n=new Date();
 return n.toLocaleDateString()+" "+n.toLocaleTimeString();
}

/* CRUD */
function adicionarColaborador(){
 const nome=nomeColaborador.value.trim();
 if(!nome) return;
 colaboradores.push({nome,pontos:0});
 nomeColaborador.value="";
 atualizarTela();
}

function removerColaborador(i){
 colaboradores.splice(i,1);
 atualizarTela();
}

function criarCampanha(){
 const nome=nomeCampanha.value.trim();
 const valor=parseInt(valorCampanha.value);
 if(!nome||isNaN(valor)) return;
 campanhas.push({nome,valor});
 pontosPorCampanha.push(0);
 nomeCampanha.value=""; valorCampanha.value="";
 atualizarTela();
}

function removerCampanha(i){
 campanhas.splice(i,1);
 pontosPorCampanha.splice(i,1);
 atualizarTela();
}

/* PONTOS */
function aplicarCampanha(){
 const c=selectColaborador.value;
 const k=selectCampanha.value;
 if(c===""||k==="") return;

 lastCol=c;
 lastCamp=k;

 colaboradores[c].pontos+=campanhas[k].valor;
 pontosPorCampanha[k]+=campanhas[k].valor;

 historico.unshift(`💰 +${campanhas[k].valor} | ${colaboradores[c].nome} | ${campanhas[k].nome}\n${getDataHora()}`);
 atualizarTela();
}

function removerPontos(){
 const c=selectColaborador.value;
 const k=selectCampanha.value;
 if(c===""||k==="") return;

 lastCol=c;
 lastCamp=k;

 colaboradores[c].pontos=Math.max(0,colaboradores[c].pontos-campanhas[k].valor);
 pontosPorCampanha[k]=Math.max(0,pontosPorCampanha[k]-campanhas[k].valor);

 historico.unshift(`➖ Remoção | ${colaboradores[c].nome} | ${campanhas[k].nome}\n${getDataHora()}`);
 atualizarTela();
}

/* INFRAÇÃO */
function aplicarInfracao(){
 const c = selectInfracaoColaborador.value;
 const pontos = parseInt(pontosInfracao.value);
 const motivo = motivoInfracao.value;

 if(c==="" || isNaN(pontos) || !motivo){
   alert("Preencha todos os campos da infração");
   return;
 }

 lastCol=c;

 colaboradores[c].pontos = Math.max(0, colaboradores[c].pontos - pontos);

 historico.unshift(
   `${motivo}\n-${pontos} pontos\nColaborador: ${colaboradores[c].nome}\n${getDataHora()}`
 );

 pontosInfracao.value="";
 motivoInfracao.value="";
 atualizarTela();
}

/* UI */
function atualizarTela(){

/* selects */
selectColaborador.innerHTML="";
selectInfracaoColaborador.innerHTML="";
colaboradores.forEach((c,i)=>{
 selectColaborador.innerHTML+=`<option value="${i}" ${lastCol==i?"selected":""}>${c.nome}</option>`;
 selectInfracaoColaborador.innerHTML+=`<option value="${i}" ${lastCol==i?"selected":""}>${c.nome}</option>`;
});

selectCampanha.innerHTML="";
campanhas.forEach((c,i)=>{
 selectCampanha.innerHTML+=`<option value="${i}" ${lastCamp==i?"selected":""}>${c.nome} (+${c.valor})</option>`;
});

/* listas */
listaColaboradores.innerHTML="";
colaboradores.forEach((c,i)=>{
 listaColaboradores.innerHTML+=`<div class="colaborador-item">👤 ${c.nome}<button class="remover-btn" onclick="removerColaborador(${i})">❌</button></div>`;
});

listaCampanhas.innerHTML="";
campanhas.forEach((c,i)=>{
 listaCampanhas.innerHTML+=`<div class="campanha-item">🏷️ ${c.nome} (+${c.valor})<button class="remover-btn" onclick="removerCampanha(${i})">❌</button></div>`;
});

/* ranking */
const rankingDiv=document.getElementById("ranking");
rankingDiv.innerHTML="";
let rankingArr=[...colaboradores].sort((a,b)=>b.pontos-a.pontos);
const max = rankingArr[0]?.pontos || 0;
const min = rankingArr[rankingArr.length-1]?.pontos || 0;

rankingArr.forEach(c=>{
 let cor = c.pontos===max?"verde":(c.pontos===min?"vermelho":"amarelo");
 rankingDiv.innerHTML+=`<div class="ranking-item ${cor}">🏆 ${c.nome}: ${c.pontos}</div>`;
});

/* dashboard colaboradores */
const colColors = colaboradores.map(c=>{
 if(c.pontos===max) return "#00ff00";
 if(c.pontos===min) return "#ff4444";
 return "#ffcc00";
});

if(chartColaboradores) chartColaboradores.destroy();
chartColaboradores=new Chart(document.getElementById("chartColaboradores"),{
 type:"bar",
 data:{labels:colaboradores.map(c=>c.nome),datasets:[{data:colaboradores.map(c=>c.pontos),backgroundColor:colColors}]},
 options:{responsive:true,scales:{y:{beginAtZero:true}},plugins:{legend:{display:false}}}
});

/* dashboard campanhas */
const maxCamp=Math.max(...pontosPorCampanha,0);
const minCamp=Math.min(...pontosPorCampanha,0);
const campColors=pontosPorCampanha.map(v=>{
 if(v===maxCamp) return "#00ff00";
 if(v===minCamp) return "#ff4444";
 return "#ffcc00";
});

if(chartCampanhas) chartCampanhas.destroy();
chartCampanhas=new Chart(document.getElementById("chartCampanhas"),{
 type:"bar",
 data:{labels:campanhas.map(c=>c.nome),datasets:[{data:pontosPorCampanha,backgroundColor:campColors}]},
 options:{responsive:true,scales:{y:{beginAtZero:true}},plugins:{legend:{display:false}}}
});

/* histórico */
const historicoDiv=document.getElementById("historico");
historicoDiv.innerHTML="";
historico.slice(0,30).forEach(h=>{
 historicoDiv.innerHTML+=`<div class="hist-item">${h}</div>`;
});

}

/* =========================
   SISTEMA DE SALVAMENTO
========================= */

function salvarDados(){
 const dados = {
   colaboradores,
   campanhas,
   historico,
   pontosPorCampanha
 };
 localStorage.setItem("sistemaPontuacao", JSON.stringify(dados));
}

function carregarDados(){
 const dados = localStorage.getItem("sistemaPontuacao");
 if(dados){
   const obj = JSON.parse(dados);
   colaboradores = obj.colaboradores || [];
   campanhas = obj.campanhas || [];
   historico = obj.historico || [];
   pontosPorCampanha = obj.pontosPorCampanha || [];
 }
}

/* botão salvar */
document.getElementById("btnSalvar").addEventListener("click", ()=>{
 salvarDados();
 alert("Dados salvos com sucesso!");
});

/* salvar automaticamente ao fechar a aba */
window.addEventListener("beforeunload", salvarDados);

/* carregar ao abrir */
carregarDados();
atualizarTela();
</script>

</body>
</html>
